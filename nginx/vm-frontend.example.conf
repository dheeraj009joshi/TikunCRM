# Example: Next.js on the same VM as nginx (no Docker for the app).
# Merge the `map` block into `http { }` once, and the `upstream` + `server` as needed.
#
# After editing: sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

