name: Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

env:
  DOCKER_BUILDKIT: 1

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run linting
        working-directory: backend
        run: |
          pip install ruff
          ruff check . --ignore E501

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linting
        working-directory: frontend
        run: npm run lint || true

      - name: Build check
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'all' }}
        run: |
          ssh $VM_USER@$VM_HOST << 'ENDSSH'
            set -e
            
            echo "=========================================="
            echo "Starting deployment at $(date)"
            echo "=========================================="
            
            # Navigate to project directory
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Pull latest changes
            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            
            # Load environment variables
            if [ -f .env ]; then
              export $(cat .env | grep -v '^#' | xargs)
            fi
            
            # Determine what to deploy
            DEPLOY_TARGET="${{ github.event.inputs.deploy_target || 'all' }}"
            
            if [ "$DEPLOY_TARGET" = "all" ] || [ "$DEPLOY_TARGET" = "backend" ]; then
              echo "Rebuilding backend..."
              docker compose -f docker-compose.prod.yml build backend
            fi
            
            if [ "$DEPLOY_TARGET" = "all" ] || [ "$DEPLOY_TARGET" = "frontend" ]; then
              echo "Rebuilding frontend..."
              docker compose -f docker-compose.prod.yml build frontend
            fi
            
            # Restart services with zero downtime
            echo "Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Run database migrations (if any)
            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head || echo "No migrations to run"
            
            # Cleanup old images
            echo "Cleaning up old Docker images..."
            docker image prune -f
            
            # Health check
            echo "Running health checks..."
            sleep 10
            
            # Check if services are running
            if docker compose -f docker-compose.prod.yml ps | grep -q "Up"; then
              echo "✅ Services are running!"
            else
              echo "❌ Some services failed to start!"
              docker compose -f docker-compose.prod.yml logs --tail=50
              exit 1
            fi
            
            echo "=========================================="
            echo "Deployment completed at $(date)"
            echo "=========================================="
          ENDSSH

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed! Check the logs above for details."

      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
